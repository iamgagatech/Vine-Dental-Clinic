<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D7377;stop-opacity:1" />
    </linearGradient>
    <pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#fff" stroke-width="0.5" opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg3)"/>
  <rect width="1920" height="1080" fill="url(#grid)"/>
  <g fill="#0D7377" opacity="0.3">
    <rect x="100" y="200" width="300" height="400"/>
    <rect x="500" y="150" width="400" height="500"/>
    <rect x="1000" y="200" width="300" height="400"/>
    <rect x="1400" y="150" width="350" height="500"/>
  </g>
  <text x="960" y="520" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="48" opacity="0.5">
    Modern Clinic Interior
  </text>
  <text x="960" y="580" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="32" opacity="0.4">
    Place your local image here: /images/hero/hero-clinic.jpg
  </text>
</svg>